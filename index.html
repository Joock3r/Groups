<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חלוקה לקבוצות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: #2a2a3a;
    --accent: #5b6ef5;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --team-colors: #f97316, #06b6d4, #ec4899;
    --c1: #f97316;
    --c2: #06b6d4;
    --c3: #ec4899;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  header p {
    color: var(--text-muted);
    margin-top: 8px;
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .control-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .control-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .seg-btns {
    display: flex;
    gap: 8px;
  }

  .seg-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .seg-btn:hover { border-color: var(--accent); color: var(--text); }

  .seg-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Player list */
  .players-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }

  .player-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    user-select: none;
    position: relative;
  }

  .player-chip:hover {
    border-color: var(--accent);
    background: var(--surface3);
    transform: translateY(-1px);
  }

  .player-chip.selected {
    background: linear-gradient(135deg, rgba(91,110,245,0.2), rgba(167,139,250,0.15));
    border-color: var(--accent);
    color: #fff;
  }

  .player-chip.selected::after {
    content: '✓';
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: 0.65rem;
    color: var(--accent2);
  }

  /* Selection count */
  .selection-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .selection-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .selection-count span {
    color: var(--accent2);
    font-weight: 700;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover { border-color: #ef4444; color: #ef4444; }

  /* Warning */
  .warning {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: #fbbf24;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .warning.show { display: flex; }

  /* Split button */
  .split-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .split-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .split-btn:hover::before { opacity: 1; }
  .split-btn span { position: relative; z-index: 1; }

  .split-btn:active { transform: scale(0.98); }

  /* Teams output */
  .teams-container {
    display: grid;
    gap: 20px;
    animation: fadeUp 0.4s ease;
  }

  .teams-container.two-teams { grid-template-columns: 1fr 1fr; }
  .teams-container.three-teams { grid-template-columns: 1fr 1fr 1fr; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .team-card {
    background: var(--surface);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.2s;
  }

  .team-card:hover { transform: translateY(-2px); }

  .team-header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .team-1 .team-header { background: linear-gradient(135deg, rgba(249,115,22,0.25), rgba(249,115,22,0.05)); border-bottom: 1px solid rgba(249,115,22,0.2); }
  .team-2 .team-header { background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(6,182,212,0.05)); border-bottom: 1px solid rgba(6,182,212,0.2); }
  .team-3 .team-header { background: linear-gradient(135deg, rgba(236,72,153,0.25), rgba(236,72,153,0.05)); border-bottom: 1px solid rgba(236,72,153,0.2); }

  .team-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Space Mono', monospace;
  }

  .team-1 .team-icon { background: rgba(249,115,22,0.2); color: var(--c1); }
  .team-2 .team-icon { background: rgba(6,182,212,0.2); color: var(--c2); }
  .team-3 .team-icon { background: rgba(236,72,153,0.2); color: var(--c3); }

  .team-name {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .team-count {
    margin-right: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .team-players {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .team-player {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.95rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }

  .team-player:hover { background: var(--surface3); }

  .player-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    width: 18px;
    text-align: center;
  }

  .team-1 .team-player .dot { color: var(--c1); }
  .team-2 .team-player .dot { color: var(--c2); }
  .team-3 .team-player .dot { color: var(--c3); }

  .dot { font-size: 0.5rem; opacity: 0.7; }

  /* Extra players note */
  .extra-note {
    margin-top: 8px;
    padding: 8px 14px;
    border-top: 1px dashed var(--border);
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
  }

  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
    .teams-container.two-teams,
    .teams-container.three-teams { grid-template-columns: 1fr; }
    .players-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>⚽ חלוקה לקבוצות</h1>
    <p>בחר שחקנים והגדר פרמטרים לחלוקה שוויונית אוטומטית</p>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>מספר קבוצות</label>
      <div class="seg-btns" id="numTeams">
        <button class="seg-btn active" data-val="2">2</button>
        <button class="seg-btn" data-val="3">3</button>
      </div>
    </div>
    <div class="control-group">
      <label>שחקנים בכל קבוצה</label>
      <div class="seg-btns" id="numPerTeam">
        <button class="seg-btn active" data-val="3">3</button>
        <button class="seg-btn" data-val="4">4</button>
        <button class="seg-btn" data-val="5">5</button>
      </div>
    </div>
  </div>

  <div class="players-section">
    <div class="section-title">בחר שחקנים</div>
    <div class="players-grid" id="playersGrid"></div>
    <div class="selection-info">
      <div class="selection-count">נבחרו: <span id="selCount">0</span> שחקנים</div>
      <button class="btn-clear" onclick="clearAll()">נקה הכל</button>
    </div>
  </div>

  <div class="warning" id="warning"></div>

  <button class="split-btn" onclick="splitTeams()">
    <span>⚡ חלק לקבוצות</span>
  </button>

  <div id="teamsOutput"></div>

</div>

<script>
// ============================================================
// PLAYERS LIST - ניתן לעריכה בקלות
// סדר הרשימה = דירוג (ראשון = הכי חזק)
// tall: true = גבוה (לחלוקה שוויונית של גבוהים)
// ============================================================
const ALL_PLAYERS = [
  { name: "עידו",         tall: false },
  { name: "מאור",         tall: false },
  { name: "אלירן",        tall: true  },
  { name: "שמואל",        tall: false },
  { name: "סתיו",         tall: false },
  { name: "שמוליק",       tall: true  },
  { name: "רונן",         tall: false },
  { name: "גולן",         tall: false },
  { name: "רז",           tall: false },
  { name: "דניאל",        tall: false },
  { name: "אסף א",        tall: false },
  { name: "חן",           tall: false },
  { name: "עומר",         tall: false },
  { name: "אסף מ",        tall: false },
  { name: "אלדד פ",       tall: false },
  { name: "יוני",         tall: false },
  { name: "אלדד",         tall: false },
  { name: "מיכאל",        tall: true  },
  { name: "אור",          tall: false },
  { name: "עומרי",        tall: false },
  { name: "תמיר",         tall: true  },
  { name: "סער",          tall: false },
  { name: "נתי",          tall: false },
  { name: "שחר",          tall: false },
  { name: "גיל",          tall: true  },
  { name: "אחימאיר",      tall: true  },
  { name: "טל",           tall: false },
];

// ============================================================
// STATE
// ============================================================
let selected = new Set();
let numTeams = 2;
let numPerTeam = 3;

// Sort alphabetically for display
const sortedPlayers = [...ALL_PLAYERS].sort((a, b) => a.name.localeCompare(b.name, 'he'));

// Build player grid
function buildGrid() {
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';
  sortedPlayers.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.textContent = p.name;
    chip.dataset.name = p.name;
    chip.onclick = () => togglePlayer(p.name, chip);
    grid.appendChild(chip);
  });
}

function togglePlayer(name, el) {
  if (selected.has(name)) {
    selected.delete(name);
    el.classList.remove('selected');
  } else {
    selected.add(name);
    el.classList.add('selected');
  }
  updateCount();
}

function updateCount() {
  document.getElementById('selCount').textContent = selected.size;
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.player-chip').forEach(c => c.classList.remove('selected'));
  updateCount();
}

// Segment buttons
document.getElementById('numTeams').querySelectorAll('.seg-btn').forEach(btn => {
  btn.onclick = () => {
    document.getElementById('numTeams').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    numTeams = +btn.dataset.val;
  };
});

document.getElementById('numPerTeam').querySelectorAll('.seg-btn').forEach(btn => {
  btn.onclick = () => {
    document.getElementById('numPerTeam').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    numPerTeam = +btn.dataset.val;
  };
});

// ============================================================
// SPLIT LOGIC
// ============================================================
function splitTeams() {
  const warn = document.getElementById('warning');
  warn.className = 'warning';

  const selNames = [...selected];
  const needed = numTeams * numPerTeam;

  if (selNames.length < needed) {
    warn.innerHTML = `⚠️ נבחרו ${selNames.length} שחקנים אך נדרשים לפחות ${needed} (${numTeams} קבוצות × ${numPerTeam} שחקנים).`;
    warn.className = 'warning show';
    document.getElementById('teamsOutput').innerHTML = '';
    return;
  }

  // Map selected players with their original ranking index
  const selPlayers = selNames.map(name => {
    const orig = ALL_PLAYERS.find(p => p.name === name);
    const rank = ALL_PLAYERS.indexOf(orig); // 0 = strongest
    return { name, tall: orig.tall, rank };
  });

  // Sort by rank (strongest first)
  selPlayers.sort((a, b) => a.rank - b.rank);

  const total = selPlayers.length;

  // ---- Divide into 3 tiers ----
  // Tier 1 = top, Tier 3 = bottom (more allowed)
  // Points: tier1=3, tier2=2, tier3=1
  const t1Count = Math.floor(total / 3);
  const t3Count = total - t1Count - Math.floor((total - t1Count) / 2);
  const t2Count = total - t1Count - t3Count;

  // Assign tiers
  selPlayers.forEach((p, i) => {
    if (i < t1Count) p.tier = 1;
    else if (i < t1Count + t2Count) p.tier = 2;
    else p.tier = 3;
  });

  // ---- Shuffle within each tier ----
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const tier1 = shuffle(selPlayers.filter(p => p.tier === 1));
  const tier2 = shuffle(selPlayers.filter(p => p.tier === 2));
  const tier3 = shuffle(selPlayers.filter(p => p.tier === 3));
  const tallPlayers = shuffle(selPlayers.filter(p => p.tall));

  // ---- Build initial teams ----
  const teams = Array.from({ length: numTeams }, () => ({ players: [], score: 0, tallCount: 0 }));

  // Helper: team with lowest score
  function lowestScoreTeam(exclude = []) {
    return teams
      .map((t, i) => ({ t, i }))
      .filter(({ i }) => !exclude.includes(i))
      .sort((a, b) => a.t.score - b.t.score)[0].i;
  }

  // Helper: team with fewest tall players
  function fewestTallTeam(exclude = []) {
    return teams
      .map((t, i) => ({ t, i }))
      .filter(({ i }) => !exclude.includes(i))
      .sort((a, b) => a.t.tallCount - b.t.tallCount)[0].i;
  }

  function addPlayer(player, teamIdx) {
    const pts = player.tier === 1 ? 3 : player.tier === 2 ? 2 : 1;
    teams[teamIdx].players.push(player);
    teams[teamIdx].score += pts;
    if (player.tall) teams[teamIdx].tallCount++;
  }

  // Distribute tier 1 round-robin by lowest score
  tier1.forEach(p => {
    // If tall, prefer fewest-tall team
    let idx = p.tall ? fewestTallTeam() : lowestScoreTeam();
    addPlayer(p, idx);
  });

  tier2.forEach(p => {
    let idx = p.tall ? fewestTallTeam() : lowestScoreTeam();
    addPlayer(p, idx);
  });

  tier3.forEach(p => {
    // Higher-scoring teams get tier3 to compensate
    let sorted = teams
      .map((t, i) => ({ t, i }))
      .sort((a, b) => b.t.score - a.t.score);
    let idx = sorted[0].i;
    // But also balance tall
    if (p.tall) idx = fewestTallTeam();
    addPlayer(p, idx);
  });

  // ---- Handle extra players beyond needed ----
  let extraNote = null;
  if (total > needed) {
    extraNote = `${total - needed} שחקן/ים יוכלו להצטרף כרצותם`;
  }

  // ---- Render ----
  const names = ["קבוצה א", "קבוצה ב", "קבוצה ג"];
  const icons = ["A", "B", "C"];

  const output = document.getElementById('teamsOutput');
  const cls = numTeams === 2 ? 'two-teams' : 'three-teams';
  output.innerHTML = `<div class="teams-container ${cls}" id="teamsGrid"></div>`;

  const grid = document.getElementById('teamsGrid');
  teams.forEach((team, i) => {
    const card = document.createElement('div');
    card.className = `team-card team-${i + 1}`;

    const playersHTML = team.players.map((p, j) => `
      <div class="team-player">
        <span class="player-num">${j + 1}</span>
        <span class="dot">●</span>
        <span>${p.name}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="team-header">
        <div class="team-icon">${icons[i]}</div>
        <div class="team-name">${names[i]}</div>
        <div class="team-count">${team.players.length} שחקנים</div>
      </div>
      <div class="team-players">
        ${playersHTML}
        ${extraNote && i === numTeams - 1 ? `<div class="extra-note">* ${extraNote}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  // Scroll to results
  output.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Init
buildGrid();
</script>
</body>
</html>
